<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login to Smart Campus Parking">
    <title>Smart Campus Parking | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="auth-container glass-panel">
        <header>
            <h1>Smart <span>Park</span></h1>
            <p>Welcome to the Automated Campus Parking System</p>
        </header>

        <section class="auth-forms">
            <div id="loginForm" class="form-wrapper active">
                <h2>Sign In</h2>
                <form onsubmit="handleAuth(event, 'login')">
                    <div class="input-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" required placeholder="name@university.edu"
                            autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" required placeholder="••••••••"
                            autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn primary-btn">Login</button>
                    <p class="switch-form">Don't have an account? <span onclick="toggleAuth()">Register</span></p>
                </form>
            </div>

            <div id="registerForm" class="form-wrapper">
                <h2>Create Account</h2>
                <form onsubmit="handleAuth(event, 'register')">
                    <div class="input-group">
                        <label for="regName">Full Name</label>
                        <input type="text" id="regName" required placeholder="John Doe">
                    </div>
                    <div class="input-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" required placeholder="name@university.edu"
                            autocomplete="username">
                    </div>
                    <div class="input-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" required placeholder="Min 6 characters"
                            autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <label for="regRole">Role</label>
                        <select id="regRole" onchange="toggleVehicleInput()">
                            <option value="User">Student/Staff (User)</option>
                            <option value="Staff">Parking Staff</option>
                            <option value="Admin">Admin</option>
                        </select>
                    </div>
                    <div class="input-group" id="vehicleGroup">
                        <label for="regVehicle">Vehicle Number</label>
                        <input type="text" id="regVehicle" placeholder="AB 12 CD 3456">
                    </div>
                    <div class="input-group" id="userTypeGroup">
                        <label for="regUserType">Campus Identity</label>
                        <select id="regUserType">
                            <option value="Student">Student</option>
                            <option value="Staff">Faculty / Staff</option>
                        </select>
                    </div>
                    <button type="submit" class="btn primary-btn">Register</button>
                    <p class="switch-form">Already have an account? <span onclick="toggleAuth()">Sign In</span></p>
                </form>
            </div>
        </section>
        <div id="toast" class="toast">Message</div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
